<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — CallBuddy AI</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container { width: 100%; max-width: 480px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 24px; color: #7F77DD; font-weight: 700; }
  .logo p { color: #666; font-size: 14px; margin-top: 4px; }
  .card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 16px; padding: 32px; }
  .plan-summary { background: #0a0a0f; border: 1px solid #7F77DD33; border-radius: 10px; padding: 16px 20px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; }
  .plan-name { font-size: 16px; font-weight: 600; color: #7F77DD; }
  .plan-price { font-size: 22px; font-weight: 700; }
  .plan-price span { font-size: 13px; color: #666; font-weight: 400; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
  input { width: 100%; background: #0a0a0f; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #7F77DD; }
  input::placeholder { color: #444; }
  .btn { width: 100%; background: #7F77DD; color: #fff; border: none; border-radius: 10px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #ff4444; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
  .secure { text-align: center; color: #444; font-size: 12px; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>CallBuddy AI</h1>
    <p>Complete your order below</p>
  </div>
  <div class="card">
    <div class="plan-summary">
      <div>
        <div class="plan-name" id="plan-name">Pro Plan</div>
        <div style="color:#666;font-size:13px;margin-top:2px;">AI Receptionist</div>
      </div>
      <div class="plan-price" id="plan-price">&#8377;24,900 <span>/mo</span></div>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="Your full name" required>
    </div>
    <div class="form-group">
      <label>Business Name</label>
      <input type="text" id="businessName" placeholder="Your business name" required>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+91 98765 43210" required>
    </div>
    <div class="error" id="error-msg"></div>
    <button class="btn" id="pay-btn" onclick="startPayment()">Pay Now</button>
    <div class="secure">&#128274; Secured by Razorpay</div>
  </div>
</div>
<script>
var PLANS = {
  starter: { name: 'Starter Plan', amount: 1490000, display: '&#8377;14,900' },
  pro:     { name: 'Pro Plan',     amount: 2490000, display: '&#8377;24,900' },
  agency:  { name: 'Agency Plan',  amount: 4990000, display: '&#8377;49,900' }
};
var params = new URLSearchParams(window.location.search);
var planKey = params.get('plan') || 'pro';
var plan = PLANS[planKey] || PLANS.pro;
document.getElementById('plan-name').textContent = plan.name;
document.getElementById('plan-price').innerHTML = plan.display + ' <span>/mo</span>';

function startPayment() {
  var fullName = document.getElementById('fullName').value.trim();
  var businessName = document.getElementById('businessName').value.trim();
  var email = document.getElementById('email').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var errDiv = document.getElementById('error-msg');
  var btn = document.getElementById('pay-btn');
  errDiv.textContent = '';
  if (!fullName || !businessName || !email || !phone) {
    errDiv.textContent = 'Please fill in all fields.';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Creating order...';
  fetch('https://callbuddy-saas.onrender.com/api/create-order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ plan: planKey, fullName: fullName, businessName: businessName, email: email, phone: phone })
  })
  .then(function(res) { return res.json().then(function(d) { return { ok: res.ok, data: d }; }); })
  .then(function(r) {
    if (!r.ok || !r.data.razorpayOrderId) {
      errDiv.textContent = r.data.message || 'Could not create order. Try again.';
      btn.disabled = false;
      btn.textContent = 'Pay Now';
      return;
    }
    var options = {
      key: 'rzp_test_Sqiz4oODb5syJ9',
      amount: r.data.amount,
      currency: 'INR',
      name: 'CallBuddy AI',
      description: plan.name,
      order_id: r.data.razorpayOrderId,
      prefill: { name: fullName, email: email, contact: phone },
      theme: { color: '#7F77DD' },
      handler: function(response) {
        window.location.href = 'https://callbuddy-saas.onrender.com/success.html?payment_id=' + response.razorpay_payment_id;
      },
      modal: {
        ondismiss: function() {
          btn.disabled = false;
          btn.textContent = 'Pay Now';
        }
      }
    };
    var rzp = new Razorpay(options);
    rzp.open();
  })
  .catch(function(err) {
    errDiv.textContent = 'Network error. Try again in 30 seconds (server may be waking up).';
    btn.disabled = false;
    btn.textContent = 'Pay Now';
  });
}
</script>
</body>
</html>
