<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — CallBuddy AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.logo{font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:0.5rem;text-align:center}
.logo span{color:#7F77DD}
.subtitle{color:#666;font-size:0.9rem;margin-bottom:2rem;text-align:center}
.back{color:#666;font-size:0.85rem;text-decoration:none;margin-bottom:1rem;display:block;text-align:center}
.back:hover{color:#fff}
.checkout-box{background:#13131f;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:2rem;width:100%;max-width:480px}
.plan-summary{background:rgba(127,119,221,0.08);border:1px solid rgba(127,119,221,0.2);border-radius:12px;padding:1.2rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center}
.plan-name{font-family:'Outfit',sans-serif;font-weight:700;color:#7F77DD}
.plan-desc{font-size:0.8rem;color:#666;margin-top:0.2rem}
.plan-price{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:900}
.plan-price span{font-size:0.9rem;color:#666;font-weight:400}
.form-group{margin-bottom:1.2rem}
label{display:block;font-size:0.85rem;color:#888;margin-bottom:0.5rem}
input{width:100%;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.85rem 1rem;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border 0.2s}
input:focus{border-color:#7F77DD}
input::placeholder{color:#444}
.pay-btn{width:100%;background:#7F77DD;color:#fff;border:none;padding:1rem;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:0.5rem}
.pay-btn:hover{background:#5a52b0;transform:translateY(-1px)}
.pay-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.secured{text-align:center;color:#444;font-size:0.8rem;margin-top:1rem;display:flex;align-items:center;justify-content:center;gap:0.4rem}
.error-msg{color:#ff4444;font-size:0.85rem;margin-top:0.5rem;min-height:20px;text-align:center;padding:0.5rem;border-radius:6px}
.error-msg:not(:empty){background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.2)}
.trust-badges{display:flex;gap:1rem;justify-content:center;margin-top:1.2rem;flex-wrap:wrap}
.badge{font-size:0.78rem;color:#666;display:flex;align-items:center;gap:0.3rem}
.badge::before{content:'✓';color:#7F77DD;font-weight:700}
</style>
</head>
<body>
<div class="logo">CallBuddy<span>AI</span></div>
<p class="subtitle">Complete your order below</p>
<a href="/" class="back">← Back to home</a>

<div class="checkout-box">
  <div class="plan-summary">
    <div>
      <div class="plan-name" id="planName">Pro Plan</div>
      <div class="plan-desc">AI Receptionist</div>
    </div>
    <div class="plan-price" id="planPrice">₹24,900<span>/mo</span></div>
  </div>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="fullName" placeholder="Your full name" required>
  </div>
  <div class="form-group">
    <label>Business Name</label>
    <input type="text" id="businessName" placeholder="Your business name" required>
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@company.com" required>
  </div>
  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="+91 98765 43210" required>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <button class="pay-btn" id="payBtn" onclick="handlePayment()">Pay Now</button>

  <div class="trust-badges">
    <span class="badge">No contracts</span>
    <span class="badge">Setup in 10 min</span>
    <span class="badge">Cancel anytime</span>
  </div>
  <div class="secured">&#128274; Secured by Razorpay</div>
</div>

<script>
const PLANS = {
  starter: { name: 'Starter Plan', price: '₹14,900', amount: 14900 },
  pro:     { name: 'Pro Plan',     price: '₹24,900', amount: 24900 },
  agency:  { name: 'Agency Plan',  price: '₹49,900', amount: 49900 }
};

const params = new URLSearchParams(window.location.search);
const planKey = params.get('plan') || 'pro';
const plan = PLANS[planKey] || PLANS.pro;

document.getElementById('planName').textContent = plan.name;
document.getElementById('planPrice').innerHTML = plan.price + '<span>/mo</span>';
document.getElementById('payBtn').textContent = 'Pay Now - ' + plan.price;

const API = 'https://callbuddy-saas.onrender.com';

async function handlePayment() {
  const fullName = document.getElementById('fullName').value.trim();
  const businessName = document.getElementById('businessName').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const errDiv = document.getElementById('errorMsg');
  const btn = document.getElementById('payBtn');

  errDiv.textContent = '';

  if (!fullName || !businessName || !email || !phone) {
    errDiv.textContent = 'Please fill in all fields.';
    return;
  }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    errDiv.textContent = 'Please enter a valid email.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating order...';

  try {
    const res = await fetch(API + '/api/create-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan: planKey, fullName, businessName, email, phone })
    });

    const data = await res.json();

    if (!res.ok) {
      errDiv.textContent = data.message || 'Failed to create order.';
      btn.disabled = false;
      btn.textContent = 'Pay Now - ' + plan.price;
      return;
    }

    const options = {
      key: data.keyId,
      amount: data.amount,
      currency: 'INR',
      name: 'CallBuddy AI',
      description: plan.name,
      order_id: data.orderId,
      prefill: { name: fullName, email: email, contact: phone },
      theme: { color: '#7F77DD' },
      handler: async function(response) {
        btn.textContent = 'Verifying...';
        try {
          const vRes = await fetch(API + '/api/verify-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature
            })
          });
          const vData = await vRes.json();
          if (vData.success) {
            sessionStorage.setItem('customerEmail', email);
            sessionStorage.setItem('customerName', fullName);
            window.location.href = '/success.html';
          } else {
            errDiv.textContent = 'Verification failed. Contact support.';
            btn.disabled = false;
            btn.textContent = 'Pay Now - ' + plan.price;
          }
        } catch(e) {
          errDiv.textContent = 'Verification error. Contact support at +91 7206170244';
          btn.disabled = false;
          btn.textContent = 'Pay Now - ' + plan.price;
        }
      },
      modal: {
        ondismiss: function() {
          btn.disabled = false;
          btn.textContent = 'Pay Now - ' + plan.price;
        }
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch(err) {
    errDiv.textContent = 'Network error. Make sure you have internet and try again.';
    btn.disabled = false;
    btn.textContent = 'Pay Now - ' + plan.price;
  }
}
</script>
</body>
</html>
